<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сброс пароля</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Arial', sans-serif;
            background: #1a2b4a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .reset-container {
            background: #ffffff;
            border-radius: 16px;
            padding: 48px 40px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .reset-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .reset-header .logo-icon {
            font-size: 38px;
            display: block;
            margin-bottom: 6px;
        }

        .reset-header h1 {
            font-size: 20px;
            font-weight: 700;
            color: #1a2b4a;
            letter-spacing: 0.3px;
        }

        .reset-header .subtitle {
            font-size: 14px;
            color: #6a7b8c;
            margin-top: 4px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #1a2b4a;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e5ec;
            border-radius: 8px;
            font-size: 15px;
            color: #1a2b4a;
            background: #f8faff;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .form-group input:focus {
            border-color: #1a2b4a;
            box-shadow: 0 0 0 4px rgba(26, 43, 74, 0.06);
            background: #ffffff;
        }

        .form-group input::placeholder {
            color: #a0b0c0;
            font-size: 14px;
        }

        .btn-reset {
            width: 100%;
            padding: 14px;
            background: #1a2b4a;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
            letter-spacing: 0.5px;
        }

        .btn-reset:hover {
            background: #0d1b2a;
        }

        .back-link {
            text-align: center;
            margin-top: 16px;
        }

        .back-link a {
            color: #1a2b4a;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: #fde8e8;
            color: #d12b2b;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
            border-left: 4px solid #d12b2b;
        }

        @media (max-width: 480px) {
            .reset-container {
                padding: 32px 24px 28px;
                margin: 16px;
            }
            .reset-header h1 {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

    <div class="reset-container">
        
        <div class="reset-header">
            <h1>Сброс пароля</h1>
            <div class="subtitle">Введите ваш email, и мы отправим ссылку для восстановления доступа</div>
        </div>

        <form method="post">
            {% csrf_token %}

            {% if form.non_field_errors %}
                <div class="error-message">{{ form.non_field_errors }}</div>
            {% endif %}

            <div class="form-group">
                <label for="id_email">Email</label>
                <input type="email" name="email" id="id_email" 
                       placeholder="example@club.ru" 
                       value="{{ form.email.value|default:'' }}" 
                       required autofocus>
                {% if form.email.errors %}
                    <div style="color:#d12b2b; font-size:13px; margin-top:4px;">
                        {{ form.email.errors }}
                    </div>
                {% endif %}
            </div>

            <button type="submit" class="btn-reset">Отправить ссылку</button>

            <div class="back-link">
                <a href="{% url 'login' %}">← Вернуться ко входу</a>
            </div>
        </form>

    </div>

</body>
</html>
