<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Письмо отправлено</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Arial', sans-serif;
            background: #1a2b4a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .done-container {
            background: #ffffff;
            border-radius: 16px;
            padding: 48px 40px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        .done-container .icon { font-size: 48px; margin-bottom: 16px; }
        .done-container h1 {
            font-size: 22px;
            color: #1a2b4a;
            margin-bottom: 8px;
        }
        .done-container p {
            color: #6a7b8c;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 8px;
        }
        .done-container .back-link { margin-top: 24px; }
        .done-container .back-link a {
            color: #1a2b4a;
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
        }
        .done-container .back-link a:hover { text-decoration: underline; }
        @media (max-width: 480px) {
            .done-container { padding: 32px 24px; margin: 16px; }
        }
    </style>
</head>
<body>

    <div class="done-container">
        <h1>Письмо отправлено</h1>
        <p>Мы отправили вам ссылку для сброса пароля на указанный email.</p>
        <div class="back-link">
            <a href="{% url 'login' %}">← Вернуться ко входу</a>
        </div>
    </div>

</body>

</html>
